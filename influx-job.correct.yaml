apiVersion: batch/v1
kind: Job
metadata:
  name: influx-metrics-deployer
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: Never
      volumes:              # mount the script as a ConfigMap volume
        - name: script-volume                   
          configMap:
            name: influx-results-setup         # matches ConfigMap name from above (influx-results-setup)
            items: 
               - key: setup_InfluxMetrics.pshl   # file name inside the pod
                 path: /setup_InfluxMetrics.sh    # relative path, not .sh? it's okay; need to match the script path inside container
       # Adjust so we reference the correct ConfigMap name (the one created above)
      containers:
        - name: run-script
          image: alpine:3.20            # includes ash + curl
          command: ["/bin/sh", "/setup_InfluxMetrics.sh"]
          volumeMounts:
            - name: script-volume
              mountPath: /           # make script available at root (script will be at /)
