## Traefik HelmChart configuration
## https://github.com/traefik/traefik-helm-chart

service:
  enabled: true
  type: LoadBalancer
  spec:
    loadBalancerIP: 192.168.30.230

ports:
  web:
    port: 80
  websecure:
    port: 443
    exposedPort: 443
    protocol: TCP
    tls:
      enabled: true

providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
      publishedService:
        path:
          - "$(SERVICE_NAME)\svc/proxy"

ingressRoute:
  dashboard:
    enabled: true
    matchRules:
      - EntryPoints: web
    middlewares:
      - name: traefik-admin-auth
        namespace: traefik

middleware:
  traefik-admin-auth:
    headers:
      stsMaxAge: 315360000
      stsIncludeSubdomains: true

ingressClass:
  enabled: true
  isDefaultClass: true
