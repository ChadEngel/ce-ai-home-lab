## Traefik HelmChart configuration
## https://github.com/traefik/traefik-helm-chart

service:
  enabled: true
  type: LoadBalancer
  spec:
    loadBalancerIP: 192.168.30.230

ports:
  web:
    port: 80
  websecure:
    port: 443

providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
      path: "$(SERVICE_NAME)/svc/traefik"

ingressClass:
  enabled: true
  isDefaultClass: true
