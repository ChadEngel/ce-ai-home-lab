# Cloudflare DNS credentials for cert-manager DNS-01 solver.
#
# This file is INTENTIONALLY empty in the repo. The `cloudflare-dns-creds`
# Secret in the `cert-manager` namespace (key `CF_API_TOKEN`) is **managed by
# the Infisical operator** — it is synced from Infisical by the
# `cloudflare-dns-creds-sync` InfisicalSecret:
#
#   Infisical secret `CLOUDFLARE_API_TOKEN`  (org `caehomelab`, project
#   `secret-management`, env `prod`, path `/`)
#     -> K8s Secret `cert-manager/cloudflare-dns-creds`[`CF_API_TOKEN`]
#
# See `clusters/util-server/applications/infisical-operator/README.md` for
# the full setup (Machine Identity, credentials Secret, the InfisicalSecret
# CR). Do NOT create this Secret manually on a cluster where the operator is
# running — the operator owns it and would overwrite a manual value.
#
# In all cases, the resulting Secret must be in the `cert-manager` namespace
# and have a key named `CF_API_TOKEN`.
