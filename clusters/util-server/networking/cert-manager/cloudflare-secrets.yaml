# Cloudflare DNS credentials for cert-manager
# 
# Get your API token from: https://dash.cloudflare.com/settings/api-tokens
# Use template "Edit zone DNS" for least-privilege access
#
# Steps:
# 1. Go to https://dash.cloudflare.com/settings/api-tokens
# 2. Create Token → Use Template → Edit zone DNS
# 3. Select your zone (caehomelab.com)
# 4. Copy the token and add below

apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-dns-creds
  namespace: cert-manager
type: Opaque
stringData:
  CF_API_TOKEN: "vF_your-cloudflare-token-here"
