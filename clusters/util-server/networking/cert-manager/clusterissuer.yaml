apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: chad@engelmn.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          dns01:
            provider: cloudflare
          zones:
            - caehomelab.com

---
# Create Cloudflare DNS credentials secret
# Get API Token from https://dash.cloudflare.com/settings/api-tokens
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-dns-creds
  namespace: cert-manager
type: Opaque
stringData:
  CF_API_TOKEN: "your-cloudflare-api-token-here"
