apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@caehomelab.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          dns01:
            provider: godaddy
          zones:
            - caehomelab.com

---
# Create GoDaddy DNS credentials secret
# Replace with your actual GoDaddy API credentials
apiVersion: v1
kind: Secret
metadata:
  name: godaddy-dns-creds
  namespace: cert-manager
type: Opaque
stringData:
  GO_DADDY_API_KEY: "your-api-key-here"
  GO_DADDY_API_SECRET: "your-api-secret-here"
