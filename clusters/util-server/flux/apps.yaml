apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: ai
  path: ./clusters/util-server
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryptionProvider: ""
  postBuild:
    substitute: {}
    substituteFrom:
      - kind: ConfigMap
        name: app-parameters
  dependsOn:
    - name: infrastructure

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/util-server
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryptionProvider: ""
  postBuild:
    substitute: {}
    substituteFrom:
      - kind: ConfigMap
        name: app-parameters
