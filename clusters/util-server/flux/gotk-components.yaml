# Flux v2 components
# Generated by: flux install --components=source-controller

apiVersion: source.toolkit.fluxcd.io/v1
kind: Bucket
metadata:
  name: gitops-bucket
  namespace: flux-system
spec:
  provider: generic
  interval: 5m
  bucketName: gitops-repo
  insecure: false
  secretRef:
    name: gitops-bucket-auth

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/ChadEngel/ce-ai-home-lab.git
  secretRef:
    name: gitops-repository
  ignore: |
    /*
    !**/.flux.yml

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://traefik.github.io/charts
  timeout: 3m
  provider: helm
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.jetstack.io
  timeout: 3m
  provider: helm
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nfs-client
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
  timeout: 3m
  provider: helm
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 1h
  url: https://metallb.github.io/metallb
  timeout: 3m
  provider: helm
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
