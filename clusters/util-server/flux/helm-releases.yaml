apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 5m
  reconcileStrategy: Manual
  values:
    installCRDs: true
    replicas: 2
    dns01:
      enabled: true
    extraArgs:
      - --enable-cni
  interval: 5m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 5m
  values:
    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 192.168.30.230
    ports:
      web:
        port: 80
      websecure:
        port: 443
        exposedPort: 443
        protocol: TCP
        tls:
          enabled: true
    providers:
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
          publishedService:
            path: ["$(SERVICE_NAME)/svc/proxy"]
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 5m
  values:
    storageClass:
      enabled: true
    speakers:
      enabled: true
    policy:
      enabled: true
    pools:
      - name: default-ipv4
        addressRange:
          - "192.168.30.230-192.168.30.240"
