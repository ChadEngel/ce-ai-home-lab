## NFS Subdir External Provisioner configuration
## https://github.com/kubernetes-sigs/nfs-subdir-external-provisioner
##
## NOTE: This values file is for reference only. The cluster is NOT managed
## via the Helm release anymore (the original `nfs-storage` Helm release was
## replaced by a raw manifest, and `helm` is not installed on the nodes).
## The canonical, applied-from-this-repo manifests live alongside this file:
##
##     kustomization.yaml  serviceaccount.yaml  rbac.yaml
##     storageclass.yaml   deployment.yaml
##
## Apply with:  kubectl apply -k clusters/util-server/storage/nfs/
##
## The values below are kept in sync with those manifests so anyone who
## prefers the Helm chart can reproduce the same configuration.

nfs:
  server: 192.168.30.121
  path: /data/pod_data

storageClass:
  name: nfs-client
  defaultClass: true
  archiveOnDelete: false
  archiveOnEmpty: false
  reclaimPolicy: Retain
  allowVolumeExpansion: true
  mountOptions:
    - soft
    - nfsvers=4.1
  parameters:
    archiveOnDelete: "false"
    archiveOnEmpty: "false"

provisioner:
  # Must match the StorageClass `provisioner:` field and the deployment's
  # PROVISIONER_NAME env. Originally `k8s-sigs.io/nfs-subdir-external-provisioner`;
  # the live cluster uses the `cluster.local/...` name.
  name: cluster.local/nfs-storage-nfs-subdir-external-provisioner
  replicas: 1
  # Single replica on a single-node cluster => leader election is pointless
  # and only introduces a restart-on-apiserver-latency failure mode. Disabled.
  leaderElection:
    enabled: false

persistence:
  enabled: true
  size: 1Gi

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    memory: 256Mi
