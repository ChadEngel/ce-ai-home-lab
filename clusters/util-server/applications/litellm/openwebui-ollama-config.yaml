apiVersion: v1
kind: ConfigMap
metadata:
  name: openwebui-ollama-config
  namespace: ai
data:
  # Update Open WebUI to use LiteLLM as model provider
  OLLAMA_BASE_URL: "http://litellm-api.ai.svc.cluster.local:4000/v1"
  LITELLM_ENABLED: "true"
  LITELLM_MODEL: "ollama-models"
  OLLAMA_API_BASE_URL: "http://ollama-api.ai.svc.cluster.local:11434"

# When using Infisical for secrets management:
# 1. Create project in Infisical at https://secrets.example.com
# 2. Create environment (prod, staging, dev)
# 3. Create secrets for each application
# 4. Set up webhook to sync secrets to Kubernetes Secret resources
# 5. Reapply secrets after initial Infisical setup
# 
# Infisical syncs secrets to:
# - OpenWebUI: API_TOKEN, OPENROUTER_API_KEY, LITELLM_SECRET_KEY
# - LiteLLM: LITELLM_SECRET_KEY, LITELLM_MASTER_KEY, OSK_OPENROUTER_API_KEY
# - Ollama: (cluster internal, uses direct configuration)
#
# For initial setup, use kustomization.yaml stringData values.
# After Infisical deployment, use kubectl apply -f clusters/util-server/applications/infisical/secrets.yaml
# to create initial secret resources that Infisical will manage.
