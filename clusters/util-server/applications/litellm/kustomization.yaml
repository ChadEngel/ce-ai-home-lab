apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

apiVersion: v1
kind: Service
metadata:
  name: litellm-api
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000

---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: ai
type: Opaque
stringData:
  LITELLM_SECRET_KEY: "sk-litellm-secret-key-change-me"
  LITELLM_MASTER_KEY: "sk-litellm-master-key-change-me"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  litellm_settings.yaml: |
    # LiteLLM Configuration
    # Provider-specific settings
    
    # Ollama settings (external server)
    ollama_model_list:
      - model_name: llama3
        litellm_params:
          model: ollama/chat/llama3
          api_base: http://aiserver.home:11434
      - model_name: mistral
        litellm_params:
          model: ollama/chat/mistral
          api_base: http://aiserver.home:11434
      - model_name: mixtral
        litellm_params:
          model: ollama/chat/mixtral
          api_base: http://aiserver.home:11434

    # OpenRouter settings (API access)
    openrouter_model_list:
      - model_name: gpt-4o
        litellm_params:
          model: openrouter/chat/gpt-4o
          api_key: osk-YOUR_OPENROUTER_KEY
      - model_name: llama-3-openai
        litellm_params:
          model: openrouter/meta-llama/llama-3-70b-instruct
          api_key: osk-YOUR_OPENROUTER_KEY
      - model_name: claude-3.5
        litellm_params:
          model: openrouter/anthropic/claude-3.5-sonnet
          api_key: osk-YOUR_OPENROUTER_KEY

    # Default fallback
    litellm_settings:
      - model_name: *
        litellm_params:
          api_key: osk-DEFAULT
          timeout: 120

      # Model price configuration
      - model_name: *
        litellm_params:
          litellm_model_name: ollama-models

      # Rate limiting
      - model_name: *
        litellm_params:
          rate_limit:
            - token_limit: 100000
              window: 24h
              duration: 86400
              budget: 1.0

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: litellm-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/config/litellm_settings.yaml
              subPath: litellm_settings.yaml
            - name: litellm-data
              mountPath: /app/data
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: litellm-data
          persistentVolumeClaim:
            claimName: litellm-pvc

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-ingress
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik-v2
  tls:
    - hosts:
        - llm.caehomelab.com
      secretName: litellm-tls
  rules:
    - host: llm.caehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm-api
                port:
                  number: 4000
