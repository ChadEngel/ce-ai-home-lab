## MCPO (Model Context Protocol for Open WebUI) configuration
## https://ghcr.io/open-webui/mcpo

image:
  repository: ghcr.io/open-webui/mcpo
  tag: main
  pullPolicy: IfNotPresent

pod:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

service:
  type: ClusterIP
  port: 8000

env:
  - name: MCP_SERVER
    value: "webhooks"
