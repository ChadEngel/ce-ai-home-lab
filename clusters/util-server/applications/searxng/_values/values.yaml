## SearXNG configuration
## https://github.com/searxng/searxng

image:
  repository: searxng/searxng
  tag: latest
  pullPolicy: IfNotPresent

pod:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

service:
  type: ClusterIP
  port: 8080

env:
  - name: SEARXNG_SETTINGS
    value: |
      server:
        secret_key: "CHANGE_ME_SECRET_KEY"
        limiter: false
        image_proxy: true
        method: "POST"
        bot_detection:
          enabled: false
        default_http_headers:
          X-Content-Type-Options: nosniff
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: no-referrer
      ui:
        default_locale: "en"
        default_theme: simple
      search:
        formats:
          - html
          - json

ingress:
  enabled: true
  annotations:
    ingress.kubernetes.io/proxy-body-size: "0"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: search.caehomelab.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: searxng-tls
      hosts:
        - search.caehomelab.com

storage:
  enabled: true
  size: 2Gi
  storageClass: nfs-client
  accessModes:
    - ReadWriteOnce
  mountPath: /searxng/sessions

healthcheck:
  path: /
  port: 8080
