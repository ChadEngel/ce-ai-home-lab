apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

apiVersion: v1
kind: Service
metadata:
  name: searxng-api
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
        storage: 2Gi

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: searxng-ingress
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - search.caehomelab.com
      secretName: searxng-tls
  rules:
    - host: search.caehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: searxng-api
                port:
                  number: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
            - name: searxng-data
              mountPath: /searxng/sessions
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: 250m
              memory: 512Mi
          # The image (SearXNG 2026.6.24+) no longer ships a /healthcheck
          # endpoint — the liveness probe was failing with 404, which made
          # Kubernetes kill the pod every minute. Readiness on / is enough.
      volumes:
        - name: config
          configMap:
            name: searxng-settings
        - name: searxng-data
          persistentVolumeClaim:
            claimName: searxng-pvc

---
# SearXNG settings (mounted as /etc/searxng/settings.yml)
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: ai
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "searxng-secret-key-change-me"
      limiter: false
      image_proxy: true
      method: "POST"
      bot_detection:
        enabled: false
      listen:
        host: "::"
        port: 8080
      default_http_headers:
        X-Content-Type-Options: nosniff
        X-XSS-Protection: "1; mode=block"
        Referrer-Policy: no-referrer
    ui:
      default_locale: "en"
      default_theme: simple
    search:
      formats:
        - html
        - json
      default_formats:
        - html
