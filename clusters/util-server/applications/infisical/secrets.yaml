apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: ai
type: Opaque
stringData:
  # JWT Secret for Infisical authentication
  JWT_SECRET: "infisical-jwt-secret-change-me-generate-secure-value"
  # Secret key base for sessions
  NEXT_SECRET_KEY_BASE: "infisical-secret-key-base-change-me"
  # Environment type
  NEXT_PUBLIC_INFISICAL_SERVICE_ENV: "kubernetes"
  # Environment ID
  NEXT_PUBLIC_INFISICAL_ENVIRONMENT_ID: "1"
  # Logo URL (can be customized)
  NEXT_PUBLIC_INFISICAL_LOGO_URL: "https://infisical.com/static/infisical-logo.svg"
  # Onboarding project ID
  NEXT_PUBLIC_INFISICAL_ONBOARDING_PROJECT_ID: "1"
  # Infisical instance configuration
  INFISICAL_OPEN_SIGNUP_ENABLED: "true"
  INFISICAL_SMTP_ENABLED: "false"
  INFISICAL_EMAIL_AUTH_ENABLED: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: infisical-db-creds
  namespace: ai
type: Opaque
stringData:
  POSTGRES_PASSWORD: "infisical-db-password-change-me"
