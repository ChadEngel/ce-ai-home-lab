# Infisical — self-hosted secrets management
#
# Image: infisical/infisical (Docker Hub)
# URL:   https://secrets.caehomelab.com
#
# Components
#   - infisical     : Next.js / Go sidecar web app (port 3000)
#   - infisical-db  : PostgreSQL 16 (the only persistent data store)
#   - infisical-redis : Redis (required by Infisical for sessions + queues)
#
# After pod start
#   1. Visit https://secrets.caehomelab.com and create the initial admin user.
#   2. Create projects for cloudflare / influxdb / openrouter.
#   3. Add the actual secret values via the web UI.
#   4. (Optional) Deploy the Infisical Kubernetes Operator so the secrets
#      sync into native K8s Secrets.
#
# Notes on env vars
#   - AUTH_SECRET      is required (used by NextAuth/Auth.js)
#   - ENCRYPTION_KEY   is required (used for field-level encryption)
#   - DB_CONNECTION_URI is the canonical DB connection string
#   - SITE_URL         must match the public URL (used for OAuth callbacks)
#   - REDIS_URL        points at the in-cluster redis service
# Placeholders below MUST be replaced before the first deploy (use
# `openssl rand -hex 32` to generate AUTH_SECRET/ENCRYPTION_KEY).

apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: ai
type: Opaque
stringData:
  # Replace these two before deploying! `openssl rand -hex 16` produces a
  # 32-char string suitable for ENCRYPTION_KEY (AES-128 / 16-byte raw key
  # interpreted as 32 ASCII chars). AUTH_SECRET accepts any string ≥ 32
  # chars. The placeholders below let the pod start but are NOT secure.
  AUTH_SECRET: "infisical-auth-secret-change-me-now-please"
  ENCRYPTION_KEY: "a1b2c3d4e5f6789012345678901234ab"

---
# Single source of truth for the PostgreSQL credentials. Both the
# infisical-db Deployment and the infisical app's DB_CONNECTION_URI
# reference this Secret (the URI is templated in the ConfigMap below).
apiVersion: v1
kind: Secret
metadata:
  name: infisical-db-creds
  namespace: ai
type: Opaque
stringData:
  POSTGRES_USER: "infisical"
  POSTGRES_PASSWORD: "infisical-db-password-change-me"
  POSTGRES_DB: "infisical"
  # DB_CONNECTION_URI mirrors the three above; if you change any of the
  # POSTGRES_* keys, update this string too.
  DB_CONNECTION_URI: "postgresql://infisical:infisical-db-password-change-me@infisical-db:5432/infisical"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infisical-deployment-info
  namespace: ai
data:
  # Redis
  REDIS_URL: "redis://infisical-redis:6379"

  # Public URL (must be reachable from users' browsers)
  SITE_URL: "https://secrets.caehomelab.com"

  # Mail (disabled; signup via email is the default, just configure SMTP
  # in the UI later if you want email-based auth)
  SMTP_ENABLED: "false"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical
  namespace: ai
  labels:
    app: infisical
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: infisical
  template:
    metadata:
      labels:
        app: infisical
    spec:
      containers:
        - name: infisical
          image: infisical/infisical:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: infisical-deployment-info
            - secretRef:
                name: infisical-secrets
            - secretRef:
                name: infisical-db-creds
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - name: infisical-data
              mountPath: /var/fuse
      volumes:
        - name: infisical-data
          persistentVolumeClaim:
            claimName: infisical-data

---
apiVersion: v1
kind: Service
metadata:
  name: infisical
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: infisical
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infisical-ingress
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - secrets.caehomelab.com
      secretName: infisical-ssl-certs
  rules:
    - host: secrets.caehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infisical
                port:
                  number: 8080

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infisical-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: infisical-db
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: infisical-db
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-db
  namespace: ai
  labels:
    app: infisical-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical-db
  template:
    metadata:
      labels:
        app: infisical-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: infisical-db-creds
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infisical-db-creds
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: infisical-db-creds
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: infisical-db-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - infisical
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - infisical
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: infisical-db-data
          persistentVolumeClaim:
            claimName: infisical-db-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infisical-db-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: infisical-redis
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: infisical-redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-redis
  namespace: ai
  labels:
    app: infisical-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical-redis
  template:
    metadata:
      labels:
        app: infisical-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: infisical-redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: infisical-redis-data
          persistentVolumeClaim:
            claimName: infisical-redis-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infisical-redis-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 2Gi
