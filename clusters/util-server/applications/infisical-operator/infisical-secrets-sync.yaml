# InfisicalSecret CRs — the Infisical Kubernetes Operator syncs these
# Infisical secrets into native Kubernetes Secrets that pods consume.
#
# Prerequisites:
#   1. Operator installed:  see install-secrets-operator.yaml
#   2. Machine Identity "homelab-k8s-operator" exists in Infisical with
#      Universal Auth (clientId/clientSecret) and Viewer role on the
#      `secret-management` project / `prod` environment.
#   3. K8s Secret `infisical-universal-auth` in namespace `ai` holds the
#      clientId/clientSecret. Created out-of-band:
#
#        kubectl create secret generic infisical-universal-auth -n ai \
#          --from-literal=clientId=<id> --from-literal=clientSecret=<secret>
#
# Auth model: Universal Auth (single Machine Identity). secretsPath "/"
# with recursive=false reads only the secrets at the root path, where all
# keys live. Each InfisicalSecret uses template.data to write ONLY the key
# the target K8s Secret needs (least-privilege), remapped to the K8s
# Secret key name the consumer expects.
#
# To add a new Infisical-managed secret: add it in the Infisical UI at
# secret-management / prod / path "/", then add a managedKubeSecretReferences
# entry (or a new InfisicalSecret) here that maps it to a K8s Secret.

---
# Sync CLOUDFLARE_API_TOKEN -> cert-manager/cloudflare-dns-creds[CF_API_TOKEN]
# Consumed by: cert-manager ClusterIssuer letsencrypt-prod (DNS-01 solver).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: cloudflare-dns-creds-sync
  namespace: ai
spec:
  hostAPI: https://secrets.caehomelab.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: ai
      secretsScope:
        projectSlug: caehomelab-v1q6
        envSlug: prod
        secretsPath: "/"
        recursive: false
  managedKubeSecretReferences:
    - secretName: cloudflare-dns-creds
      secretNamespace: cert-manager
      creationPolicy: Owner
      template:
        data:
          CF_API_TOKEN: "{{ .CLOUDFLARE_API_TOKEN.Value }}"

---
# Sync INFLUXDB_TOKEN -> ai/influxdb-secrets[INFLUX_TOKEN]
# Consumed by: Grafana (datasource basic-auth password via init-container envsubst).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: influxdb-secrets-sync
  namespace: ai
spec:
  hostAPI: https://secrets.caehomelab.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: ai
      secretsScope:
        projectSlug: caehomelab-v1q6
        envSlug: prod
        secretsPath: "/"
        recursive: false
  managedKubeSecretReferences:
    - secretName: influxdb-secrets
      secretNamespace: ai
      creationPolicy: Owner
      template:
        data:
          INFLUX_TOKEN: "{{ .INFLUXDB_TOKEN.Value }}"

---
# Sync BIFROST_OLLAMA_KEY -> ai/bifrost-secrets[BIFROST_API_KEY]
# Consumed by:
#   - Bifrost: its gateway API key (BIFROST_API_KEY env). Enable enforcement
#     in the Bifrost UI to require it from clients.
#   - Open WebUI: sent as the OpenAI bearer key (OPENAI_API_KEY env, via
#     secretKeyRef on this same secret/key) so the OpenWebUI->Bifrost hop is
#     authenticated with the same key Bifrost expects.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: bifrost-secrets-sync
  namespace: ai
spec:
  hostAPI: https://secrets.caehomelab.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: ai
      secretsScope:
        projectSlug: caehomelab-v1q6
        envSlug: prod
        secretsPath: "/"
        recursive: false
  managedKubeSecretReferences:
    - secretName: bifrost-secrets
      secretNamespace: ai
      creationPolicy: Owner
      template:
        data:
          BIFROST_API_KEY: "{{ .BIFROST_OLLAMA_KEY.Value }}"

---
# Sync OPENWEBUI_OLLAMA_BASE_URL -> ai/openwebui-secrets[OPENAI_API_BASE_URL]
# Consumed by: Open WebUI (OPENAI_API_BASE_URL env via secretKeyRef) — the
# OpenAI-compatible base URL of the Bifrost gateway.
# NOTE: the value MUST include the /v1 suffix (e.g. https://llm.caehomelab.com/v1).
# Bifrost serves the OpenAI list/models at /v1/* only; without /v1 Open WebUI
# would hit the Bifrost HTML UI and see no models.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: openwebui-secrets-sync
  namespace: ai
spec:
  hostAPI: https://secrets.caehomelab.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: ai
      secretsScope:
        projectSlug: caehomelab-v1q6
        envSlug: prod
        secretsPath: "/"
        recursive: false
  managedKubeSecretReferences:
    - secretName: openwebui-secrets
      secretNamespace: ai
      creationPolicy: Owner
      template:
        data:
          OPENAI_API_BASE_URL: "{{ .OPENWEBUI_OLLAMA_BASE_URL.Value }}"