# Grafana monitoring stack (InfluxDB v2 source + auto-provisioned dashboards)
#
# Data source: http://aiserver.home:8086 (InfluxDB v2, org=home, bucket=kube_metrics)
#
# Two secrets must be supplied for the stack to work:
#   1. `grafana-secrets`        — admin user/password (defaults: admin/admin)
#   2. `influxdb-secrets`       — INFLUX_TOKEN with read access to the
#                                 `kube_metrics` bucket in the `home` org
#
# Both are defined in this kustomization with placeholders. Replace them
# before applying (see README.md for the recommended workflow via Infisical).
#
# After deployment:
#   - Dashboards appear automatically under "default" folder
#   - Login at https://grafana.caehomelab.com with the admin password

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: ai
type: Opaque
stringData:
  admin-user: "admin"
  # Change this before exposing publicly
  admin-password: "admin"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: ai
data:
  datasources.yaml: |
    apiVersion: 1
    # Force Grafana to delete the existing InfluxDB datasource before
    # re-creating it from this file. This is REQUIRED because Grafana's file
    # provisioning only applies `secureJsonData` on FIRST creation — it will
    # NOT overwrite a secure field on an already-existing datasource. Without
    # this, switching the token from `basicAuthPassword` to `token` (or
    # rotating the token) silently has no effect.
    deleteDatasources:
      - name: InfluxDB
        orgId: 1
    datasources:
      - name: InfluxDB
        type: influxdb
        access: proxy
        orgId: 1
        uid: dfdkew37wk1dse
        url: http://aiserver.home:8086
        version: 2
        editable: false
        isDefault: true
        jsonData:
          timeInterval: 60s
          influxdbVersion: 2
          # `version: Flux` selects the AUTH scheme (token-based, sends
          # `Authorization: Token <token>`). Without it Grafana defaults to
          # InfluxQL auth (looks for `password`, not `token`) and InfluxDB
          # rejects every query with "unauthorized access" even though the
          # token is stored. `queryLanguage: flux` below only selects the
          # query parser, NOT the auth scheme.
          version: Flux
          organization: home
          defaultBucket: kube_metrics
          queryLanguage: flux
          tlsSkipVerify: true
        secureJsonData:
          # Grafana sends this as `Authorization: Token <token>` for Flux queries.
          token: ${INFLUX_TOKEN}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: ai
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/default

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ai
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        - name: render-datasource
          image: alpine:3.19
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache gettext >/dev/null
              echo "Template file from ConfigMap:"
              cat /tmp/datasources.yaml
              echo "---"
              envsubst < /tmp/datasources.yaml > /etc/grafana/provisioning/datasources/datasources.yaml
              echo "Rendered datasources:"
              cat /etc/grafana/provisioning/datasources/datasources.yaml
          env:
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secrets
                  key: INFLUX_TOKEN
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: render-source
              mountPath: /tmp
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: grafana-secrets
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-password
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secrets
                  key: INFLUX_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards-json
              mountPath: /var/lib/grafana/dashboards/default
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-datasources
          emptyDir: {}
        - name: render-source
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        # Created by deploy-grafana.sh from scripts/grafana/dashboards/*.json
        - name: grafana-dashboards-json
          configMap:
            name: grafana-dashboards-json
            optional: true
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - grafana.caehomelab.com
      secretName: grafana-tls
  rules:
    - host: grafana.caehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
