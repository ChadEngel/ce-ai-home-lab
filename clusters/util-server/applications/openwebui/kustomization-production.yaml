apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kustomization.yaml

labels:
  - pairs:
      app: openwebui
    includeSelectors: true
    includeTemplateLabels: true

patches:
  - patch: |
      -op: replace
      -path: /spec/replicas
      -value: 2
    target:
      kind: Deployment