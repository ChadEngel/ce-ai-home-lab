# Open WebUI — main LLM chat UI.
#
# Connection target (live): Bifrost AI gateway (OpenAI-compatible)
#   OPENAI_API_BASE_URL - from Infisical secret OPENWEBUI_OLLAMA_BASE_URL
#     (synced into K8s Secret openwebui-secrets). MUST end in /v1, e.g.
#     https://llm.caehomelab.com/v1 — Bifrost serves /v1/* only.
#   OPENAI_API_KEY      - from Infisical secret BIFROST_OLLAMA_KEY (synced into
#     K8s Secret bifrost-secrets as BIFROST_API_KEY). Same key Bifrost reads
#     as its gateway key, so the hop is authenticated once enforcement is on.
#
# IMPORTANT: Bifrost speaks the OpenAI API (/v1/models, /v1/chat/completions),
# NOT the Ollama API (/api/tags). So Open WebUI MUST reach it via the OpenAI
# connection (OPENAI_API_BASE_URL), not via OLLAMA_BASE_URL. Pointing
# OLLAMA_BASE_URL at Bifrost yields an empty model list because Open WebUI
# then calls /api/tags, which Bifrost does not implement.
#
# To switch to direct external Ollama (bypassing Bifrost), set
#   OLLAMA_BASE_URL=http://aiserver.home:11434
# and remove the OPENAI_API_BASE_URL / OPENAI_API_KEY entries.
#
# CAVEAT — admin Connections UI overrides env vars:
# Open WebUI persists the OpenAI connection (api_base_urls, api_keys,
# api_configs) in its DB (config table, id=1, key "openai") the first time an
# admin saves Settings -> Connections, and that DB config TAKES PRECEDENCE over
# these env vars. For Infisical to remain the single source of truth for the
# URL/key, the DB "openai" entry must be kept as {"enable": true} ONLY (no
# api_base_urls / api_keys / api_configs). If the UI starts showing no models,
# reset it: in the pod, set config.openai back to {"enable": true} and restart.
# (api_configs["0"].enable=false or a typo'd URL here are the usual culprits.)
#
# See clusters/util-server/applications/openwebui/bifrost-config.yaml for
# the leftover ConfigMap from the LiteLLM era — it is NOT referenced by
# this Deployment and can be deleted (kubectl delete cm -n ai openwebui-bifrost-config).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: ai
spec:
  selector:
    app: openwebui
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-ingress
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    # Long timeouts for LLM generation streaming (Bifrost can take minutes)
    traefik.ingress.kubernetes.io/protocol: http
    traefik.ingress.kubernetes.io/response-forwarding-headers: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ai.caehomelab.com
      secretName: openwebui-tls
  rules:
    - host: ai.caehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui
                port:
                  number: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ai
  labels:
    app: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      affinity:
        nodeAffinity:
          # Prefer the dedicated worker node (caelx002) so the control-plane
          # node (util-server) stays free for cluster services; falls back to
          # util-server if the worker is down. Uses the built-in
          # kubernetes.io/hostname label, so no manual node labeling is needed.
          # To PIN to the worker instead, switch preferred -> required and set
          # operator: In (pod will go Pending if caelx002 is unavailable).
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - caelx002
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.10.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: WEBUI_NAME
              value: "Open WebUI"
            # Bifrost is an OpenAI-compatible gateway, so Open WebUI must use
            # the OpenAI connection — NOT OLLAMA_BASE_URL (Bifrost has no /api/tags).
            # Base URL comes from Infisical (OPENWEBUI_OLLAMA_BASE_URL) via the
            # openwebui-secrets sync. MUST include the /v1 suffix — Bifrost serves
            # the OpenAI API at /v1/* only; without /v1 Open WebUI hits the HTML UI.
            - name: OPENAI_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: OPENAI_API_BASE_URL
            # Bearer key Open WebUI sends to Bifrost. Same Infisical secret
            # (BIFROST_OLLAMA_KEY) that Bifrost reads as BIFROST_API_KEY, so the
            # OpenWebUI->Bifrost hop is authenticated with the key Bifrost expects
            # once gateway-key enforcement is enabled in the Bifrost UI. A non-empty
            # value also ENABLES Open WebUI's OpenAI mode.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bifrost-secrets
                  key: BIFROST_API_KEY
            # RAG settings to avoid slow embedding downloads on cold start
            - name: HF_HUB_OFFLINE
              value: "1"
            # --- SQLite journal mode ------------------------------------------------
            # Open WebUI defaults DATABASE_ENABLE_SQLITE_WAL=True, which runs
            # `PRAGMA journal_mode=WAL` on every connection. WAL's win is concurrent
            # readers-during-write — useless for a single uvicorn worker — and its
            # `-shm` index is an mmap'd shared-memory file that is NOT safe on NFS
            # (our webui.db lives on the nfs-client PVC). DELETE mode uses a plain
            # rollback journal (regular file, NFS-safe) and the switch auto-
            # checkpoints + removes the existing -wal/-shm files on next connect.
            - name: DATABASE_ENABLE_SQLITE_WAL
              value: "false"
            # DELETE journal mode is only crash-safe with synchronous=FULL (NORMAL
            # is safe only under WAL). Write rate is tiny (chat history), so the
            # per-commit fsync is negligible. Keeps the DB integrity-safe on power loss.
            - name: DATABASE_SQLITE_PRAGMA_SYNCHRONOUS
              value: "FULL"
          resources:
            requests:
              cpu: 1
              memory: 2Gi
            limits:
              cpu: "3"
              memory: 4Gi
          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data
      volumes:
        - name: openwebui-data
          persistentVolumeClaim:
            claimName: openwebui-pvc
