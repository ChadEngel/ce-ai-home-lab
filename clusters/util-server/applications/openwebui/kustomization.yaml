# Open WebUI — main LLM chat UI.
#
# Connection target (live): Bifrost AI gateway (OpenAI-compatible)
#   OPENAI_API_BASE_URL=http://bifrost-api.ai.svc.cluster.local:8080/v1
#   OPENAI_API_KEY=bifrost-placeholder  (non-empty value ENABLES Open WebUI's
#     OpenAI connection; the value is irrelevant since Bifrost is keyless)
#
# IMPORTANT: Bifrost speaks the OpenAI API (/v1/models, /v1/chat/completions),
# NOT the Ollama API (/api/tags). So Open WebUI MUST reach it via the OpenAI
# connection (OPENAI_API_BASE_URL), not via OLLAMA_BASE_URL. Pointing
# OLLAMA_BASE_URL at Bifrost yields an empty model list because Open WebUI
# then calls /api/tags, which Bifrost does not implement.
#
# To switch to direct external Ollama (bypassing Bifrost), set
#   OLLAMA_BASE_URL=http://aiserver.home:11434
# and remove the OPENAI_API_BASE_URL / OPENAI_API_KEY entries.
#
# See clusters/util-server/applications/openwebui/bifrost-config.yaml for
# the leftover ConfigMap from the LiteLLM era — it is NOT referenced by
# this Deployment and can be deleted (kubectl delete cm -n ai openwebui-bifrost-config).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: ai
spec:
  selector:
    app: openwebui
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-ingress
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    # Long timeouts for LLM generation streaming (Bifrost can take minutes)
    traefik.ingress.kubernetes.io/protocol: http
    traefik.ingress.kubernetes.io/response-forwarding-headers: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ai.caehomelab.com
      secretName: openwebui-tls
  rules:
    - host: ai.caehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui
                port:
                  number: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ai
  labels:
    app: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: WEBUI_NAME
              value: "Open WebUI"
            # Bifrost is an OpenAI-compatible gateway, so Open WebUI must use
            # the OpenAI connection — NOT OLLAMA_BASE_URL (Bifrost has no /api/tags).
            - name: OPENAI_API_BASE_URL
              value: "http://bifrost-api.ai.svc.cluster.local:8080/v1"
            # Non-empty key ENABLES Open WebUI's OpenAI mode (value is a dummy —
            # Bifrost is keyless). Without this, OPENAI_API_BASE_URL is ignored.
            - name: OPENAI_API_KEY
              value: "bifrost-placeholder"
            # RAG settings to avoid slow embedding downloads on cold start
            - name: HF_HUB_OFFLINE
              value: "1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data
      volumes:
        - name: openwebui-data
          persistentVolumeClaim:
            claimName: openwebui-pvc
