apiVersion: v1
kind: ConfigMap
metadata:
  name: openwebui-bifrost-config
  namespace: ai
data:
  # OpenWebUI configuration for Bifrost AI gateway (replaces LiteLLM)
  # Bifrost exposes /v1/chat/completions on port 8080
  OLLAMA_BASE_URL: "http://bifrost-api.ai.svc.cluster.local:8080/v1"
  LITELLM_ENABLED: "false"
  
  # If you still want direct Ollama access as a fallback (optional)
  OLLAMA_API_BASE_URL: "http://aiserver.home:11434"

# NOTE: After deploying Bifrost, configure your providers via:
#   https://llm.caehomelab.com → Settings → Providers
# Then update model names in OpenWebUI settings to use Bifrost format:
#   - Ollama:       ollama/chat/llama3
#   - OpenRouter:   openrouter/meta-llama/llama-3-70b-instruct
#   - OpenAI:       openai/gpt-4o
