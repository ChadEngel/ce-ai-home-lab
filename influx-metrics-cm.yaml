apiVersion: v1
kind: ConfigMap
metadata:
  name: influx-metrics
data:
  run_influx.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    HOST="aiserver.home"
    # Read the InfluxDB token from the environment; never hard-code it.
    : "${INFLUX_TOKEN:?INFLUX_TOKEN must be set (e.g. from Infisical / a K8s Secret)}"
    TOKEN="${INFLUX_TOKEN}"
    URL="http://${HOST}/api/v2/write?bucket=kube_metrics&precision=s"

    # CPU percentage (non-idle)
    read cpu_user cpu_nice cpu_sys cpu_idle  _ < /proc/stat
    total_cpu=$((cpu_user + cpu_nice + cpu_sys + cpu_idle))
    usage_cpu=$(((cpu_user + cpu_nice + cpu_sys)))   # sum of non‑idle CPU time
    if (( total_cpu > 0 )); then
        cpu_pct=$(((usage_cpu * 100) / total_cpu))
    else
        cpu_pct=0
    fi

    # Memory free percentage
    mem_total=$(grep '^MemTotal:' /proc/meminfo | awk '{print $2}')
    mem_free=$(grep '^MemAvailable:' /proc/meminfo | awk '{print $2}')
    if (( mem_total > 0 )); then
        mem_pct=$(((mem_free * 100) / mem_total))
    else
        mem_pct=0
    fi

    # Node uptime (seconds)
    uptime_seconds=$(awk '{print $1}' /proc/uptime)

    # Send metrics to InfluxDB
    curl -s -X POST "$URL" \
         -H "Authorization: Token ${TOKEN}" \
         --data-raw "cpu_usage,host=$(hostname) ${cpu_pct}" > /dev/null

    curl -s -X POST "$URL" \
         -H "Authorization: Token ${TOKEN}" \
         --data-raw "memory_free_percent,host=$(hostname) ${mem_pct}" > /dev/null

    curl -s  -X POST "$URL" \
         -H "Authorization: Token ${TOKEN}" \
         --data-raw "node_uptime_seconds,host=$(hostname) ${uptime_seconds}" > /dev/null
